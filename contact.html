<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Mad Cats London</title>
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
</head>
<body data-logo="word">
<div class="page">
  <main class="container">

    <section class="section section-intro">
      <h1 class="t-script">Say Hello</h1>
      <p class="section-intro__body t-caption">Bookings, private hire, press or collaborations — drop us a line and we'll get back to you.</p>
    </section>

    <form class="form" onsubmit="return false">
      <div class="form__row">
        <div class="field">
          <label class="field__label" for="name">NAME</label>
          <input class="field__input" id="name" type="text" placeholder="Your name">
        </div>
        <div class="field">
          <label class="field__label" for="email">EMAIL</label>
          <input class="field__input" id="email" type="email" placeholder="you@email.com">
        </div>
      </div>
      <div class="field">
        <label class="field__label" for="type">ENQUIRY</label>
        <select class="field__select" id="type">
          <option>General</option>
          <option>Booking (6+ guests)</option>
          <option>Private hire</option>
          <option>Press / collaboration</option>
        </select>
      </div>
      <div class="field">
        <label class="field__label" for="msg">MESSAGE</label>
        <textarea class="field__textarea" id="msg" placeholder="Tell us about your enquiry…"></textarea>
      </div>
      <button class="btn btn--primary" type="submit">SEND ENQUIRY</button>
    </form>

    <section class="section">
      <h2 class="footer__heading">DIRECT</h2>
      <div class="footer__links">
        <a href="mailto:info@madcats.uk">General — info@madcats.uk</a>
        <a href="mailto:daniella@madcats.uk">Private hire — daniella@madcats.uk</a>
        <a href="mailto:sean@madcats.uk">Music &amp; DJs — sean@madcats.uk</a>
        <a href="tel:+442046192652">+44 2046192652</a>
      </div>
    </section>

    <section class="section">
      <h2 class="footer__heading">FOLLOW</h2>
      <div class="footer__links">
        <a href="https://instagram.com/madcatslondon" target="_blank" rel="noopener">Instagram — @madcatslondon</a>
      </div>
    </section>

    <section class="section">
      <div class="footer__links">
        <a href="https://madcats.uk/privacy-statement-uk/" target="_blank" rel="noopener">Privacy Statement</a>
        <a href="https://madcats.uk/cookie-policy-uk/" target="_blank" rel="noopener">Cookie Policy</a>
      </div>
    </section>

  </main>
</div>
<script src="js/chrome.js"></script>
<script src="js/main.js"></script>
</body>
</html>
