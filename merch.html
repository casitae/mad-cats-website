<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merch — Mad Cats London</title>
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
</head>
<body data-logo="word">
<div class="page">
  <main class="container">

    <section class="section section-intro">
      <h1 class="t-script">Limited Run Merch</h1>
      <p class="section-intro__body t-caption">In Store Purchase &amp; Pick Up Only.</p>
    </section>

    <section class="section">
      <div class="merch-grid">
        <figure class="merch-item">
          <img src="assets/images/merch/merch-tee-1.png" alt="Mad Cats T-shirt — charcoal">
          <figcaption>GBP 35</figcaption>
        </figure>
        <figure class="merch-item">
          <img src="assets/images/merch/merch-tee-2.png" alt="Mad Cats T-shirt — black">
          <figcaption>GBP 35</figcaption>
        </figure>
        <figure class="merch-item">
          <img src="assets/images/merch/merch-cap.png" alt="Mad Cats cap">
          <figcaption>GBP 25</figcaption>
        </figure>
      </div>
    </section>

  </main>
</div>
<script src="js/chrome.js"></script>
<script src="js/main.js"></script>
</body>
</html>
